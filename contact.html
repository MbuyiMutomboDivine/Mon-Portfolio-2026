   <header>

    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>

        </ul>
    </nav>
   </header>

   <main>
    <section>
        <div>
            <h2>Contactez-moi</h2>
        </div>
    </section>
    <section class="contact-container">
        <div class="contact-info">
            <h2>Mes Cordonnées</h2>
            <p>Je suis actuellement basée à <strong>Lubumbashi</strong>.</p>
            
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Lubumbashi, RDC</span>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-phone"></i>
                <span>+243 996835461</span>
            </div>

            <div class="social-direct">
                <a href="https://wa.me/243996835461" target="_blank" class="whatsapp">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://t.me/+243996835461" target="_blank" class="telegram">
                    <i class="fa-brands fa-telegram"></i> Telegram
                </a>
            </div>
        </div>

        <div class="contact-form">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Téléphone</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="+243..." required>
                </div>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </div>
    </section>
   </main>
   
   <footer>

        <p>Contactez-nous !</p>

    </div>

    </div>
